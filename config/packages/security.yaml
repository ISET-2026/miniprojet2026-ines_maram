security:
    password_hashers:
        App\Entity\User: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        main:
            lazy: true
            provider: app_user_provider   # ✅ must be INSIDE main firewall

            custom_authenticator: App\Security\AppAuthenticator
            entry_point: App\Security\AppAuthenticator

            logout:
                path: app_logout